<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Weather App</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* ===== BODY BACKGROUND ===== */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;

/* DARK ANIMATED BACKGROUND */
background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c2733);
background-size: 400% 400%;
animation: bgMove 12s ease infinite;
}

/* gradient animation */
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ===== WEATHER GLOW EFFECT ===== */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background: radial-gradient(circle, rgba(0,198,255,0.25), transparent 70%);
top:-100px;
left:-100px;
animation: floatLight 8s ease-in-out infinite;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
bottom:-120px;
right:-100px;
animation: floatLight 10s ease-in-out infinite reverse;
}

@keyframes floatLight{
0%,100%{transform: translate(0,0);}
50%{transform: translate(30px,20px);}
}

/* ===== LOGIN BOX ===== */
.login-box{
width:340px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
box-shadow:0 0 30px rgba(0,0,0,0.4);
text-align:center;
color:white;
animation:fadeIn 1.2s ease;
border:1px solid rgba(255,255,255,0.1);
z-index:1;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.login-box h2{
margin-bottom:25px;
letter-spacing:1px;
}

/* ===== INPUTS ===== */
.login-box input{
width:100%;
padding:12px;
margin:12px 0;
border:none;
border-radius:6px;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
transition:0.3s;
}

.login-box input::placeholder{
color:#ddd;
}

.login-box input:focus{
background:rgba(255,255,255,0.25);
transform:scale(1.02);
}

/* ===== BUTTON ===== */
.login-box button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#0096c7;
transform:scale(1.05);
box-shadow:0 0 15px #00c6ff;
}

/* ===== FOOTER ===== */
footer{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(90deg,#0b0f14,#0a1a22,#0b0f14);
color:#e6f7ff;
text-align:center;
padding:14px 0;
font-size:13px;
letter-spacing:1px;
border-top:1px solid #1f2a35;
}

.dev{
color:#4fc3f7;
font-weight:600;
}

</style>
</head>

<body>

<div class="login-box">
<h2>🌦 Smart Weather Login</h2>

<form action="weather.html">
<input type="email" placeholder="Enter Email" required>
<input type="password" placeholder="Enter Password" required>
<button type="submit">Login</button>
</form>

</div>

<footer>
© 2026 Smart Weather App | Crafted by <span class="dev">SAURABH</span>
</footer>

</body>
</html>
